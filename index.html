<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Oficina | CO 008</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #002d5b; color: white; padding: 15px; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .table-container { background: white; border-radius: 10px; padding: 20px; }
        
        /* Cores de Prioridade */
        .priority-ALTA { border-left: 6px solid #dc3545 !important; }
        .priority-MEDIA { border-left: 6px solid #ffc107 !important; }
        .priority-BAIXA { border-left: 6px solid #0d6efd !important; }
        
        .badge-priority { width: 80px; font-weight: bold; }
        .btn-filter { min-width: 130px; font-weight: 600; border-radius: 20px; }
        #loading { text-align: center; padding: 100px; }
        th { font-size: 0.9rem; text-transform: uppercase; color: #666; border-bottom: 2px solid #eee !important; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Painel de Manutenção - Central de Operações</h4>
        <span id="current-date" class="badge bg-light text-dark"></span>
    </div>
</nav>

<div id="loading">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3">Sincronizando com a planilha...</p>
</div>

<div class="container-fluid" id="main-content" style="display: none;">
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card p-3 h-100">
                <h6 class="text-center mb-3">Resumo de Prioridades</h6>
                <canvas id="priorityChart"></canvas>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card p-4 h-100">
                <div class="row">
                    <div class="col-md-6 border-end">
                        <h6>Filtrar por Setor</h6>
                        <div class="d-flex gap-2 mt-3">
                            <button class="btn btn-outline-dark btn-filter" onclick="filterSector('TODOS')">TODOS</button>
                            <button class="btn btn-primary btn-filter" onclick="filterSector('ELÉTRICA')">ELÉTRICA</button>
                            <button class="btn btn-info text-white btn-filter" onclick="filterSector('MECÂNICA')">MECÂNICA</button>
                        </div>
                    </div>
                    <div class="col-md-6 ps-4">
                        <h6>Status da OS</h6>
                        <div class="d-flex gap-2 mt-3">
                            <button id="btn-desenvolvimento" class="btn btn-warning btn-filter" onclick="setStatusView('DESENVOLVIMENTO')">DESENVOLVIMENTO</button>
                            <button id="btn-liberadas" class="btn btn-outline-success btn-filter" onclick="setStatusView('LIBERADAS')">OS LIBERADAS</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Recebida</th>
                        <th style="width: 40%;">Descrição Geral</th>
                        <th>Prioridade</th>
                        <th>Status OS</th>
                        <th>Setor</th>
                        <th>Previsão</th>
                    </tr>
                </thead>
                <tbody id="os-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSULFyQ_CCDdAIfRl8AES8gg3Pkde3NXeiZv2g_2DkEsvkKrAZBouHdbsYjMnCl1sgDuCvJ57ojf7pX/pub?gid=1300746091&single=true&output=csv';
    
    let fullData = [];
    let currentSector = 'TODOS';
    let currentView = 'DESENVOLVIMENTO'; 
    let chartInstance = null;

    const priorityMap = { 'ALTA': 1, 'MEDIA': 2, 'BAIXA': 3 };

    async function init() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            fullData = parseCSV(text);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            render();
        } catch (e) {
            console.error(e);
            document.getElementById('loading').innerHTML = '<h5 class="text-danger">Erro ao carregar dados.</h5>';
        }
    }

    function parseCSV(text) {
        const rows = [];
        let row = [];
        let col = "";
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"' && text[i+1] === '"') { col += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { row.push(col.trim()); col = ""; }
            else if ((char === '\r' || char === '\n') && !inQuotes) {
                if (col !== "" || row.length > 0) { row.push(col.trim()); rows.push(row); row = []; col = ""; }
            } else { col += char; }
        }
        return rows;
    }

    function render() {
        const tbody = document.getElementById('os-table-body');
        tbody.innerHTML = '';

        let filtered = fullData.slice(1).filter(row => {
            const status = (row[8] || '').toUpperCase();
            const setor = (row[9] || '').toUpperCase();
            
            // Lógica de Status (Desenvolvimento vs Liberadas)
            const isLiberada = status.includes('LIBERADA');
            const matchesView = (currentView === 'DESENVOLVIMENTO') ? !isLiberada : isLiberada;
            
            // Lógica de Setor
            const matchesSector = (currentSector === 'TODOS') || (setor === currentSector);
            
            return matchesView && matchesSector && row[0];
        });

        // Ordenação por Prioridade (Alta > Media > Baixa)
        filtered.sort((a, b) => (priorityMap[a[7]] || 99) - (priorityMap[b[7]] || 99));

        filtered.forEach(row => {
            const tr = document.createElement('tr');
            tr.className = `priority-${row[7]}`;
            tr.innerHTML = `
                <td><strong>#${row[0]}</strong></td>
                <td><small>${row[2] || '-'}</small></td>
                <td>${row[6]}</td>
                <td><span class="badge badge-priority ${getPriorityColor(row[7])}">${row[7]}</span></td>
                <td><span class="text-secondary" style="font-size: 0.85rem;">${row[8]}</span></td>
                <td><small class="fw-bold">${row[9]}</small></td>
                <td><span class="text-primary fw-bold">${row[11] || '-'}</span></td>
            `;
            tbody.appendChild(tr);
        });

        updateChart(filtered);
    }

    function getPriorityColor(p) {
        if (p === 'ALTA') return 'bg-danger';
        if (p === 'MEDIA') return 'bg-warning text-dark';
        if (p === 'BAIXA') return 'bg-primary';
        return 'bg-secondary';
    }

    function filterSector(s) {
        currentSector = s;
        render();
    }

    function setStatusView(v) {
        currentView = v;
        document.getElementById('btn-desenvolvimento').className = v === 'DESENVOLVIMENTO' ? 'btn btn-warning btn-filter' : 'btn btn-outline-warning btn-filter';
        document.getElementById('btn-liberadas').className = v === 'LIBERADAS' ? 'btn btn-success btn-filter' : 'btn btn-outline-success btn-filter';
        render();
    }

    function updateChart(data) {
        const stats = { ALTA: 0, MEDIA: 0, BAIXA: 0 };
        data.forEach(r => { if(stats[r[7]] !== undefined) stats[r[7]]++; });

        const ctx = document.getElementById('priorityChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Alta', 'Média', 'Baixa'],
                datasets: [{
                    data: [stats.ALTA, stats.MEDIA, stats.BAIXA],
                    backgroundColor: ['#dc3545', '#ffc107', '#0d6efd']
                }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
        });
    }

    document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR');
    init();
</script>

</body>
</html>
