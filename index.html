<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Oficina | Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --dark-blue: #002d5b; --light-gray: #f8f9fa; }
        body { background-color: #e9ecef; font-family: 'Segoe UI', system-ui, sans-serif; color: #333; }
        
        /* Ajustes Mobile */
        .navbar { background-color: var(--dark-blue); color: white; padding: 10px; position: sticky; top: 0; z-index: 1000; }
        .container-fluid { padding: 10px; }
        
        .card { border: none; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        /* Filtros Compactos */
        .btn-filter { font-size: 0.85rem; padding: 8px 12px; font-weight: 600; border-radius: 8px; flex: 1; }
        .btn-clear { font-size: 0.8rem; text-decoration: underline; color: #666; cursor: pointer; border: none; background: none; }

        /* Tabela Responsiva */
        .table-container { background: white; border-radius: 12px; padding: 10px; overflow-x: auto; }
        th { font-size: 0.75rem; color: #6c757d; text-transform: uppercase; border-bottom: 2px solid #f0f0f0 !important; }
        td { font-size: 0.85rem; padding: 12px 8px !important; }
        
        /* Cores de Prioridade */
        .priority-ALTA { border-left: 5px solid #dc3545 !important; background-color: #fffdfd; }
        .priority-MEDIA { border-left: 5px solid #ffc107 !important; background-color: #fffef9; }
        .priority-BAIXA { border-left: 5px solid #0d6efd !important; background-color: #f9fcff; }
        
        .badge-status { font-size: 0.7rem; background: #eee; color: #555; }
        
        #loading { text-align: center; margin-top: 100px; }
        .mobile-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; }
        .mobile-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<nav class="navbar shadow-sm">
    <div class="container-fluid">
        <span class="fw-bold">Prioridades das O.S oficinas de manutenção Central de Operações</span>
        <small id="current-date" class="opacity-75"></small>
    </div>
</nav>

<div id="loading">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted" id="loading-text">Sincronizando dados...</p>
</div>

<div class="container-fluid" id="main-content" style="display: none;">
    
    <div class="row">
        <div class="col-12 col-md-4">
            <div class="card p-3 mb-3">
                <canvas id="priorityChart" style="max-height: 150px;"></canvas>
            </div>
        </div>
        
        <div class="col-12 col-md-8">
            <div class="card p-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="mb-0">Filtros</h6>
                    <button class="btn-clear" onclick="clearFilters()">Limpar Filtros</button>
                </div>
                
                <p class="small text-muted mb-1">Setor:</p>
                <div class="mobile-scroll mb-3">
                    <button id="btn-setor-TODOS" class="btn btn-dark btn-filter" onclick="filterSector('TODOS')">TODOS</button>
                    <button id="btn-setor-ELÉTRICA" class="btn btn-outline-primary btn-filter" onclick="filterSector('ELÉTRICA')">ELÉTRICA</button>
                    <button id="btn-setor-MECÂNICA" class="btn btn-outline-info btn-filter" onclick="filterSector('MECÂNICA')">MECÂNICA</button>
                </div>

                <p class="small text-muted mb-1">Exibição:</p>
                <div class="d-flex gap-2">
                    <button id="btn-view-DESENVOLVIMENTO" class="btn btn-warning btn-filter text-white" onclick="setView('DESENVOLVIMENTO')">ATIVAS</button>
                    <button id="btn-view-LIBERADAS" class="btn btn-outline-success btn-filter" onclick="setView('LIBERADAS')">LIBERADAS</button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3 px-2">
            <h6 id="table-title" class="fw-bold mb-0">Ordens em Desenvolvimento</h6>
            <span id="row-count-badge" class="badge bg-secondary">0 OS</span>
        </div>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Equipamento / Descrição</th>
                        <th>Status / Setor</th>
                    </tr>
                </thead>
                <tbody id="os-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSULFyQ_CCDdAIfRl8AES8gg3Pkde3NXeiZv2g_2DkEsvkKrAZBouHdbsYjMnCl1sgDuCvJ57ojf7pX/pub?gid=1300746091&single=true&output=csv';
    
    let allData = [];
    let currentSector = 'TODOS';
    let currentView = 'DESENVOLVIMENTO';
    let chartInstance = null;

    const priorityOrder = { 'ALTA': 1, 'MEDIA': 2, 'BAIXA': 3 };

    async function load() {
        try {
            // SISTEMA ANTI-CACHE: Adiciona um número aleatório para forçar o download dos dados novos
            const forcingUpdate = `&cache_step=${Math.random()}`; 
            const res = await fetch(csvUrl + forcingUpdate);
            
            if (!res.ok) throw new Error('Falha na rede');
            
            const text = await res.text();
            allData = parseCSV(text);
            
            console.log(`Dados carregados: ${allData.length - 1} linhas encontradas.`);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            render();
        } catch (e) { 
            console.error(e); 
            document.getElementById('loading-text').innerHTML = '<span class="text-danger">Erro ao carregar dados. O link pode estar indisponível ou sendo atualizado pelo Google.</span>';
        }
    }

    function parseCSV(text) {
        const rows = []; let row = []; let col = ""; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"' && text[i+1] === '"') { col += '"'; i++; }
            else if (c === '"') inQuotes = !inQuotes;
            else if (c === ',' && !inQuotes) { row.push(col.trim()); col = ""; }
            else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (col !== "" || row.length > 0) { row.push(col.trim()); rows.push(row); row = []; col = ""; }
            } else col += c;
        }
        if (col !== "" || row.length > 0) { row.push(col.trim()); rows.push(row); }
        return rows;
    }

    function render() {
        const tbody = document.getElementById('os-table-body');
        tbody.innerHTML = '';

        let filtered = allData.slice(1).filter(r => {
            const status = (r[8] || '').toUpperCase();
            const sector = (r[9] || '').toUpperCase();
            const isLib = status.includes('LIBERADA');
            const matchesView = (currentView === 'DESENVOLVIMENTO') ? !isLib : isLib;
            const matchesSec = (currentSector === 'TODOS') || (sector === currentSector);
            return matchesView && matchesSec && r[0]; // r[0] garante que tem um ID
        });

        // LÓGICA DE ORDENAÇÃO
        if (currentView === 'DESENVOLVIMENTO') {
            // Por Prioridade (Alta > Média > Baixa)
            filtered.sort((a, b) => (priorityOrder[a[7]] || 99) - (priorityOrder[b[7]] || 99));
        } else {
            // Por ID Decrescente (Maior para Menor)
            filtered.sort((a, b) => parseInt(b[0] || 0) - parseInt(a[0] || 0));
        }

        // Atualiza o contador de linhas na tela
        document.getElementById('row-count-badge').innerText = `${filtered.length} OS`;

        filtered.forEach(r => {
            const tr = document.createElement('tr');
            tr.className = `priority-${r[7]}`;
            tr.innerHTML = `
                <td class="fw-bold">#${r[0]}</td>
                <td>
                    <div style="font-size: 0.8rem; font-weight: 600;">${r[6]}</div>
                    <div class="text-muted small">Rec: ${r[2]} | Prev: ${r[11] || '-'}</div>
                </td>
                <td>
                    <span class="badge badge-status mb-1">${r[8]}</span><br>
                    <small class="text-primary fw-bold">${r[9]}</small>
                </td>
            `;
            tbody.appendChild(tr);
        });

        updateUI();
        updateChart(filtered);
    }

    function updateUI() {
        document.getElementById('table-title').innerText = currentView === 'DESENVOLVIMENTO' ? 'Ordens em Desenvolvimento' : 'Histórico de OS Liberadas';
        
        document.getElementById('btn-view-DESENVOLVIMENTO').className = currentView === 'DESENVOLVIMENTO' ? 'btn btn-warning btn-filter text-white' : 'btn btn-outline-warning btn-filter';
        document.getElementById('btn-view-LIBERADAS').className = currentView === 'LIBERADAS' ? 'btn btn-success btn-filter' : 'btn btn-outline-success btn-filter';
        
        ['TODOS', 'ELÉTRICA', 'MECÂNICA'].forEach(s => {
            const btn = document.getElementById('btn-setor-' + s);
            if (currentSector === s) {
                btn.className = 'btn btn-dark btn-filter';
            } else {
                const color = s === 'ELÉTRICA' ? 'btn-outline-primary' : (s === 'MECÂNICA' ? 'btn-outline-info' : 'btn-outline-dark');
                btn.className = `btn ${color} btn-filter`;
            }
        });
    }

    function filterSector(s) { currentSector = s; render(); }
    function setView(v) { currentView = v; render(); }
    function clearFilters() { currentSector = 'TODOS'; currentView = 'DESENVOLVIMENTO'; render(); }

    function updateChart(data) {
        const stats = { ALTA: 0, MEDIA: 0, BAIXA: 0 };
        data.forEach(r => { if(stats[r[7]] !== undefined) stats[r[7]]++; });
        const ctx = document.getElementById('priorityChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Alta', 'Média', 'Baixa'],
                datasets: [{ data: [stats.ALTA, stats.MEDIA, stats.BAIXA], backgroundColor: ['#dc3545', '#ffc107', '#0d6efd'] }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR');
    
    // Inicia a aplicação
    load();
</script>

</body>
</html>
