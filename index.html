<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Oficina | Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --dark-blue: #002d5b; --light-gray: #f8f9fa; }
        body { background-color: #e9ecef; font-family: 'Segoe UI', system-ui, sans-serif; color: #333; }
        
        /* Ajustes Mobile */
        .navbar { background-color: var(--dark-blue); color: white; padding: 10px; position: sticky; top: 0; z-index: 1000; }
        .container-fluid { padding: 10px; }
        
        .card { border: none; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        /* Filtros Compactos */
        .btn-filter { font-size: 0.85rem; padding: 8px 12px; font-weight: 600; border-radius: 8px; flex: 1; }
        .btn-clear { font-size: 0.8rem; text-decoration: underline; color: #666; cursor: pointer; border: none; background: none; }

        /* Tabela Responsiva principal */
        .table-container { background: white; border-radius: 12px; padding: 10px; overflow-x: auto; }
        th { font-size: 0.75rem; color: #6c757d; text-transform: uppercase; border-bottom: 2px solid #f0f0f0 !important; }
        td { font-size: 0.85rem; padding: 12px 8px !important; }
        
        /* Efeito de Linha Clicável */
        .clickable-row { cursor: pointer; transition: background-color 0.2s; }
        .clickable-row:hover { background-color: #e2e8f0 !important; }
        
        /* Cores de Prioridade */
        .priority-ALTA { border-left: 5px solid #dc3545 !important; background-color: #fffdfd; }
        .priority-MEDIA { border-left: 5px solid #ffc107 !important; background-color: #fffef9; }
        .priority-BAIXA { border-left: 5px solid #0d6efd !important; background-color: #f9fcff; }
        
        .badge-status { font-size: 0.7rem; background: #eee; color: #555; }
        
        #loading { text-align: center; margin-top: 100px; }
        .mobile-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; }
        .mobile-scroll::-webkit-scrollbar { display: none; }
        
        /* Tabela do Modal */
        .modal-table th { font-size: 0.7rem; background-color: #f8f9fa; }
        .modal-table td { padding: 8px 4px !important; vertical-align: middle; }
    </style>
</head>
<body>

<nav class="navbar shadow-sm">
    <div class="container-fluid">
        <span class="fw-bold">Prioridades de manutenção C.O</span>
        <small id="current-date" class="opacity-75"></small>
    </div>
</nav>

<div id="loading">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted" id="loading-text">Sincronizando dados...</p>
</div>

<div class="container-fluid" id="main-content" style="display: none;">
    
    <div class="row">
        <div class="col-12 col-md-4">
            <div class="card p-3 mb-3">
                <canvas id="priorityChart" style="max-height: 150px;"></canvas>
            </div>
        </div>
        
        <div class="col-12 col-md-8">
            <div class="card p-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="mb-0">Filtros</h6>
                    <button class="btn-clear" onclick="clearFilters()">Limpar Filtros</button>
                </div>
                
                <p class="small text-muted mb-1">Setor:</p>
                <div class="mobile-scroll mb-3">
                    <button id="btn-setor-TODOS" class="btn btn-dark btn-filter" onclick="filterSector('TODOS')">TODOS</button>
                    <button id="btn-setor-ELÉTRICA" class="btn btn-outline-primary btn-filter" onclick="filterSector('ELÉTRICA')">ELÉTRICA</button>
                    <button id="btn-setor-MECÂNICA" class="btn btn-outline-info btn-filter" onclick="filterSector('MECÂNICA')">MECÂNICA</button>
                </div>

                <p class="small text-muted mb-1">Exibição:</p>
                <div class="d-flex gap-2">
                    <button id="btn-view-DESENVOLVIMENTO" class="btn btn-warning btn-filter text-white" onclick="setView('DESENVOLVIMENTO')">ATIVAS</button>
                    <button id="btn-view-LIBERADAS" class="btn btn-outline-success btn-filter" onclick="setView('LIBERADAS')">LIBERADAS</button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3 px-2">
            <h6 id="table-title" class="fw-bold mb-0">Ordens em Desenvolvimento</h6>
            <span id="row-count-badge" class="badge bg-secondary">0 OS</span>
        </div>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Equipamento (Toque para ver itens)</th>
                        <th>Status / Setor</th>
                    </tr>
                </thead>
                <tbody id="os-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="itemsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h6 class="modal-title fw-bold text-primary" id="modalTitle">Patrimônios da OS</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-2">
                <div class="table-responsive">
                    <table class="table table-bordered modal-table mb-0">
                        <thead>
                            <tr>
                                <th>Patrimônio</th>
                                <th>Descrição</th>
                                <th>Status</th>
                                <th>Fim Manut.</th>
                            </tr>
                        </thead>
                        <tbody id="items-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer p-1">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Agora temos duas URLs de dados separadas
    const urlOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSULFyQ_CCDdAIfRl8AES8gg3Pkde3NXeiZv2g_2DkEsvkKrAZBouHdbsYjMnCl1sgDuCvJ57ojf7pX/pub?gid=1300746091&single=true&output=csv';
    const urlItens = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSULFyQ_CCDdAIfRl8AES8gg3Pkde3NXeiZv2g_2DkEsvkKrAZBouHdbsYjMnCl1sgDuCvJ57ojf7pX/pub?gid=133157186&single=true&output=csv';
    
    // Variáveis para guardar os dados das duas planilhas
    let dataOS = [];
    let dataItens = [];
    
    let currentSector = 'TODOS';
    let currentView = 'DESENVOLVIMENTO';
    let chartInstance = null;

    const priorityOrder = { 'ALTA': 1, 'MEDIA': 2, 'BAIXA': 3 };

    async function load() {
        try {
            const forcingUpdate = `&cache_step=${Math.random()}`; 
            
            // Baixa as duas planilhas ao mesmo tempo
            const [resOS, resItens] = await Promise.all([
                fetch(urlOS + forcingUpdate),
                fetch(urlItens + forcingUpdate)
            ]);
            
            if (!resOS.ok || !resItens.ok) throw new Error('Falha na rede');
            
            // Transforma os textos em arrays
            dataOS = parseCSV(await resOS.text());
            dataItens = parseCSV(await resItens.text());
            
            console.log(`OS: ${dataOS.length - 1} | Itens: ${dataItens.length - 1}`);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            render();
        } catch (e) { 
            console.error(e); 
            document.getElementById('loading-text').innerHTML = '<span class="text-danger">Erro ao carregar dados. Verifique a conexão ou os links.</span>';
        }
    }

    function parseCSV(text) {
        const rows = []; let row = []; let col = ""; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"' && text[i+1] === '"') { col += '"'; i++; }
            else if (c === '"') inQuotes = !inQuotes;
            else if (c === ',' && !inQuotes) { row.push(col.trim()); col = ""; }
            else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (col !== "" || row.length > 0) { row.push(col.trim()); rows.push(row); row = []; col = ""; }
            } else col += c;
        }
        if (col !== "" || row.length > 0) { row.push(col.trim()); rows.push(row); }
        return rows;
    }

    function render() {
        const tbody = document.getElementById('os-table-body');
        tbody.innerHTML = '';

        // Filtra usando a dataOS
        let filtered = dataOS.slice(1).filter(r => {
            const status = (r[8] || '').toUpperCase();
            const sector = (r[9] || '').toUpperCase();
            const isLib = status.includes('LIBERADA');
            const matchesView = (currentView === 'DESENVOLVIMENTO') ? !isLib : isLib;
            const matchesSec = (currentSector === 'TODOS') || (sector === currentSector);
            return matchesView && matchesSec && r[0]; 
        });

        if (currentView === 'DESENVOLVIMENTO') {
            filtered.sort((a, b) => (priorityOrder[a[7]] || 99) - (priorityOrder[b[7]] || 99));
        } else {
            filtered.sort((a, b) => parseInt(b[0] || 0) - parseInt(a[0] || 0));
        }

        document.getElementById('row-count-badge').innerText = `${filtered.length} OS`;

        filtered.forEach(r => {
            const tr = document.createElement('tr');
            // Adiciona a classe clickable-row e o evento de clique (onclick) passando o ID da OS
            tr.className = `priority-${r[7]} clickable-row`;
            tr.onclick = () => showItems(r[0]); 
            tr.innerHTML = `
                <td class="fw-bold">#${r[0]}</td>
                <td>
                    <div style="font-size: 0.8rem; font-weight: 600;">${r[6]}</div>
                    <div class="text-muted small">Rec: ${r[2]} | Prev: ${r[11] || '-'}</div>
                </td>
                <td>
                    <span class="badge badge-status mb-1">${r[8]}</span><br>
                    <small class="text-primary fw-bold">${r[9]}</small>
                </td>
            `;
            tbody.appendChild(tr);
        });

        updateUI();
        updateChart(filtered);
    }
    
    // NOVA FUNÇÃO: Puxa os itens e exibe no Modal
    function showItems(idOsClicada) {
        // Atualiza o título da janela
        document.getElementById('modalTitle').innerText = `Patrimônios da OS #${idOsClicada}`;
        
        const tbodyModal = document.getElementById('items-table-body');
        tbodyModal.innerHTML = ''; // Limpa a tabela anterior
        
        // Pega todos os itens (ignorando o cabeçalho) e filtra onde a Coluna B (índice 1) é igual ao ID clicado
        const itensDaOs = dataItens.slice(1).filter(item => item[1] == idOsClicada);
        
        if (itensDaOs.length === 0) {
            tbodyModal.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-3">Nenhum patrimônio localizado para esta OS.</td></tr>`;
        } else {
            itensDaOs.forEach(item => {
                // Definindo as colunas com base no que você me passou
                const patrimonio = item[2] || '-'; // Coluna C
                const descricao = item[3] || '-';  // Coluna D
                const status = (item[4] || '-').toUpperCase(); // Coluna E
                const dataFim = item[8] || '-';    // Coluna I
                
                // Escolhendo a cor do status para ficar mais visual
                let corStatus = 'bg-secondary';
                if (status === 'CONCLUIDO') corStatus = 'bg-success';
                else if (status === 'CANCELADO') corStatus = 'bg-danger';
                else if (status.includes('AGUARDANDO')) corStatus = 'bg-warning text-dark';
                
                tbodyModal.innerHTML += `
                    <tr>
                        <td class="fw-bold text-primary" style="font-size: 0.8rem;">${patrimonio}</td>
                        <td style="font-size: 0.75rem;">${descricao}</td>
                        <td><span class="badge ${corStatus}" style="font-size: 0.65rem;">${status}</span></td>
                        <td style="font-size: 0.75rem;">${dataFim}</td>
                    </tr>
                `;
            });
        }
        
        // Comando do Bootstrap para abrir o Modal na tela
        const modalElement = new bootstrap.Modal(document.getElementById('itemsModal'));
        modalElement.show();
    }

    function updateUI() {
        document.getElementById('table-title').innerText = currentView === 'DESENVOLVIMENTO' ? 'Ordens em Desenvolvimento' : 'Histórico de OS Liberadas';
        
        document.getElementById('btn-view-DESENVOLVIMENTO').className = currentView === 'DESENVOLVIMENTO' ? 'btn btn-warning btn-filter text-white' : 'btn btn-outline-warning btn-filter';
        document.getElementById('btn-view-LIBERADAS').className = currentView === 'LIBERADAS' ? 'btn btn-success btn-filter' : 'btn btn-outline-success btn-filter';
        
        ['TODOS', 'ELÉTRICA', 'MECÂNICA'].forEach(s => {
            const btn = document.getElementById('btn-setor-' + s);
            if (currentSector === s) {
                btn.className = 'btn btn-dark btn-filter';
            } else {
                const color = s === 'ELÉTRICA' ? 'btn-outline-primary' : (s === 'MECÂNICA' ? 'btn-outline-info' : 'btn-outline-dark');
                btn.className = `btn ${color} btn-filter`;
            }
        });
    }

    function filterSector(s) { currentSector = s; render(); }
    function setView(v) { currentView = v; render(); }
    function clearFilters() { currentSector = 'TODOS'; currentView = 'DESENVOLVIMENTO'; render(); }

    function updateChart(data) {
        const stats = { ALTA: 0, MEDIA: 0, BAIXA: 0 };
        data.forEach(r => { if(stats[r[7]] !== undefined) stats[r[7]]++; });
        const ctx = document.getElementById('priorityChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Alta', 'Média', 'Baixa'],
                datasets: [{ data: [stats.ALTA, stats.MEDIA, stats.BAIXA], backgroundColor: ['#dc3545', '#ffc107', '#0d6efd'] }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR');
    
    // Inicia a aplicação
    load();
</script>

</body>
</html>
